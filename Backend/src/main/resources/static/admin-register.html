<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Registration</title>

    <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
            rel="stylesheet"
    >

    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-md-6 col-lg-5">

            <div class="card shadow">

                <div class="card-header bg-primary text-white text-center">

                    <h3 class="mb-0">Admin Registration</h3>

                </div>

                <div class="card-body p-4">

                    <form id="adminRegisterForm">

                        <div class="mb-3">

                            <label
                                    for="fullName"
                                    class="form-label"
                            >
                                Full Name
                            </label>

                            <input
                                    type="text"
                                    class="form-control"
                                    id="fullName"
                                    placeholder="Enter full name"
                                    required
                            >

                        </div>

                        <div class="mb-3">

                            <label
                                    for="email"
                                    class="form-label"
                            >
                                Email
                            </label>

                            <input
                                    type="email"
                                    class="form-control"
                                    id="email"
                                    placeholder="Enter email"
                                    required
                            >

                        </div>

                        <div class="mb-3">

                            <label
                                    for="phone"
                                    class="form-label"
                            >
                                Phone Number
                            </label>

                            <input
                                    type="tel"
                                    class="form-control"
                                    id="phone"
                                    placeholder="0771234567"
                                    maxlength="10"
                                    required
                            >

                        </div>

                        <div class="mb-4">

                            <label
                                    for="password"
                                    class="form-label"
                            >
                                Password
                            </label>

                            <input
                                    type="password"
                                    class="form-control"
                                    id="password"
                                    placeholder="Enter password"
                                    required
                            >

                        </div>

                        <button
                                type="submit"
                                class="btn btn-primary w-100"
                        >
                            Register Admin
                        </button>

                    </form>

                    <div
                            id="message"
                            class="mt-3 text-center"
                    ></div>

                    <div class="text-center mt-3">

                        <a href="admin-login.html">
                            Already registered? Login
                        </a>

                    </div>

                </div>

            </div>

        </div>

    </div>

</div>

<script src="admin-register.js"></script>

</body>
</html>
